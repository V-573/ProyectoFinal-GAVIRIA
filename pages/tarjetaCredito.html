<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pago Seguro</title>
    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/tarjetaCredito.js" defer></script>
  </head>
  <body>
    <div class="payment-container" id="checkout-form">
      <a href="./cart.html" style="color: var(--accent); text-decoration: none"
        >← Volver al carrito</a
      >
      <h2>Finalizar Pago</h2>
      <form id="credit-card-form">
        <div class="form-group">
          <label>Nombre en la tarjeta</label>
          <input type="text" placeholder="JUAN PEREZ" required />
        </div>
        <div class="form-group">
          <label>Número de tarjeta</label>
          <input
            type="text"
            placeholder="0000 0000 0000 0000"
            inputmode="numeric"
            maxlength="16"
            required
          />
        </div>
        <div class="row">
          <div class="form-group">
            <label>Expiración</label>
            <input type="text" placeholder="MM/AA" maxlength="5" required />
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="123" maxlength="3" required />
          </div>
        </div>
        <button
          type="submit"
          class="btn-checkout"
          style="background: var(--accent); color: black"
        >
          Pagar Ahora
        </button>
      </form>
    </div>

    <div class="payment-container" id="payment-status">
      <div id="loading-process">
        <div class="loader"></div>
        <p>Procesando pago con la entidad bancaria...</p>
      </div>
      <div id="success-msg" style="display: none">
        <h2 style="color: #28a745">¡Pago Exitoso! ✅</h2>
        <p>Tu código de descarga ha sido enviado a tu correo.</p>
        <button
          class="btn-buy"
          onclick="window.location.href = '../index.html'"
        >
          Volver al inicio
        </button>
      </div>
    </div>
  </body>
</html>
